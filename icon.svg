<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0d0d0d"/>
  
  <!-- Outer border — thin green line -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="#39d353" stroke-width="1.5"/>
  
  <!-- Inner corner accents — terminal feel -->
  <line x1="4" y1="4" x2="16" y2="4" stroke="#39d353" stroke-width="3"/>
  <line x1="4" y1="4" x2="4" y2="16" stroke="#39d353" stroke-width="3"/>
  <line x1="96" y1="4" x2="84" y2="4" stroke="#39d353" stroke-width="3"/>
  <line x1="96" y1="4" x2="96" y2="16" stroke="#39d353" stroke-width="3"/>
  <line x1="4" y1="96" x2="16" y2="96" stroke="#39d353" stroke-width="3"/>
  <line x1="4" y1="96" x2="4" y2="84" stroke="#39d353" stroke-width="3"/>
  <line x1="96" y1="96" x2="84" y2="96" stroke="#39d353" stroke-width="3"/>
  <line x1="96" y1="96" x2="96" y2="84" stroke="#39d353" stroke-width="3"/>

  <!-- F -->
  <text x="18" y="63"
        font-family="'Courier New', Courier, monospace"
        font-size="52"
        font-weight="700"
        fill="#39d353"
        letter-spacing="-2">F</text>

  <!-- / — muted -->
  <text x="49" y="63"
        font-family="'Courier New', Courier, monospace"
        font-size="52"
        font-weight="300"
        fill="#555">&#47;</text>

  <!-- T -->
  <text x="65" y="63"
        font-family="'Courier New', Courier, monospace"
        font-size="52"
        font-weight="700"
        fill="#eee">T</text>

  <!-- Blinking cursor block — bottom right -->
  <rect x="80" y="70" width="8" height="12" fill="#39d353" opacity="0.8"/>
</svg>
